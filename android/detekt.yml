build:
  maxIssues: 0
  excludeCorrectable: false

complexity:
  LongMethod:
    threshold: 80
  LongParameterList:
    functionThreshold: 8
    constructorThreshold: 10
  TooManyFunctions:
    thresholdInClasses: 24

style:
  MagicNumber:
    ignoreNumbers: ['-1', '0', '1', '2', '3', '8', '10', '24', '100', '1000']
  ReturnCount:
    max: 5
  WildcardImport:
    active: true

naming:
  FunctionParameterNaming:
    active: true
  VariableNaming:
    active: true

empty-blocks:
  EmptyFunctionBlock:
    active: true
    ignoreOverridden: true
